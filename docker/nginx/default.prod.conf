# =============================================================================
# Nginx — Odonto Scheduler (Produção com HTTPS)
# Coloque os certificados em docker/nginx/certs/odonto.crt e odonto.key
# Ou use Let's Encrypt via certbot (veja README de deploy).
# =============================================================================

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name clinica.universobh.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/odonto.crt;
    ssl_certificate_key /etc/nginx/certs/odonto.key;

    # Protocolos e ciphers modernos (Mozilla "Intermediate" config)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/html/public;
    index index.php;

    server_tokens off;
    client_max_body_size 12M;
    client_body_timeout  15s;
    client_header_timeout 15s;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "geolocation=(), microphone=()"       always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net; font-src 'self' cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self' cdn.jsdelivr.net;"
        always;

    # Bloqueio de arquivos sensíveis
    location ~ /\. { deny all; return 404; }
    location ~ ^/(src|config|database|storage|docker|bin|vendor)(/|$) { deny all; return 404; }
    location ~* \.(sql|log|env|lock|json|yml|yaml|xml|sh|md)$ { deny all; return 404; }

    # Front Controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        # Passa proto original para PHP detectar HTTPS
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        include fastcgi_params;
        fastcgi_read_timeout   120s;
        fastcgi_send_timeout   120s;
        fastcgi_connect_timeout 10s;
        fastcgi_buffer_size        128k;
        fastcgi_buffers            8 256k;
        fastcgi_busy_buffers_size  256k;
        fastcgi_intercept_errors on;
    }

    location ~* ^/(src|config|database|vendor)/.*\.php$ { deny all; return 404; }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on; gzip_vary on; gzip_proxied any; gzip_comp_level 6; gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    access_log /var/log/nginx/odonto_access.log;
    error_log  /var/log/nginx/odonto_error.log warn;
}
