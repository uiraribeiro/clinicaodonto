# =============================================================================
# Nginx — Odonto Scheduler
# Equivalente Nginx de todas as regras que seriam .htaccess no Apache.
# Este arquivo substitui completamente o .htaccess (que não existe no Nginx).
# =============================================================================

server {
    listen 80;
    server_name localhost;

    # Webroot: apenas o diretório public/ é acessível pelo cliente
    root /var/www/html/public;
    index index.php;

    # ── Segurança geral ───────────────────────────────────────────────────────

    # Oculta versão do Nginx (equivalente a ServerTokens Off no Apache)
    server_tokens off;

    # Tamanho máximo de upload
    client_max_body_size 12M;

    # Timeout de leitura do corpo (proteção contra slow-body attacks)
    client_body_timeout 15s;
    client_header_timeout 15s;

    # ── Headers de segurança HTTP ─────────────────────────────────────────────
    # (equivalente a Header always set ... no Apache mod_headers)

    add_header X-Frame-Options           "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "geolocation=(), microphone=()"     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net; font-src 'self' cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self' cdn.jsdelivr.net;"
        always;

    # ── Bloqueio de arquivos e diretórios sensíveis ───────────────────────────
    # (equivalente ao RewriteRule + FilesMatch + Deny from all no Apache)

    # Nega acesso a qualquer arquivo ou diretório oculto (.env, .git, .gitignore...)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Nega acesso direto às pastas internas da aplicação
    # (src/, config/, database/, storage/, docker/, bin/, vendor/)
    location ~ ^/(src|config|database|storage|docker|bin|vendor)(/|$) {
        deny all;
        return 404;
    }

    # Nega acesso a arquivos de configuração que possam estar no webroot
    location ~* \.(sql|log|env|lock|json|yml|yaml|xml|sh|md)$ {
        deny all;
        return 404;
    }

    # ── Rota principal — Front Controller (Slim Router) ───────────────────────
    # Equivalente ao mod_rewrite + RewriteCond !-f !-d + RewriteRule ^ index.php

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────

    location ~ \.php$ {
        # Impede processar PHP fora do webroot (path traversal)
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_pass  odonto_php:9000;
        fastcgi_index index.php;

        # SCRIPT_FILENAME usa realpath para evitar path traversal
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        include fastcgi_params;

        # Timeouts compatíveis com geração de agenda (operação pesada)
        fastcgi_read_timeout  120s;
        fastcgi_send_timeout  120s;
        fastcgi_connect_timeout 10s;

        # Buffer para respostas grandes (relatórios PDF)
        fastcgi_buffer_size        128k;
        fastcgi_buffers            8 256k;
        fastcgi_busy_buffers_size  256k;

        # Não loga erros 404 de PHP inexistente como críticos
        fastcgi_intercept_errors on;
    }

    # Bloqueia execução de PHP fora da raiz (garante que vendor/ etc. não executem)
    location ~* ^/(src|config|database|vendor)/.*\.php$ {
        deny all;
        return 404;
    }

    # ── Assets estáticos ─────────────────────────────────────────────────────
    # (equivalente ao mod_expires + ExpiresActive no Apache)

    location ~* \.(css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Não loga acesso a assets (reduz ruído nos logs)
        access_log off;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    # (equivalente ao mod_deflate no Apache)

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Logs ──────────────────────────────────────────────────────────────────

    access_log /var/log/nginx/odonto_access.log;
    error_log  /var/log/nginx/odonto_error.log warn;
}
